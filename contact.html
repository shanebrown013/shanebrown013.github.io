<!DOCTYPE html>
<html>
    <head>
            <title>
                About Me
            </title>
            <link rel="stylesheet" href="DesignContact.css">
    </head>
    <body>
        <div class= "Links">
            <ul>
                <li><a class="active" href= "index.html">Home</a></li>
                <li><a href= "about.html">About</a></li>
                <li><a href= "contact.html">Contact</a></li>
                <li><a href= "#projects">Projects</a> </li>
            </ul>
        </div>

        <div class="bg">
        </div>

        <div class="middleHeader">
            <h1>
                Contact<br> Me!
            </h1>
        </div>
         <div class="contactContent">
            <div style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; border-radius: 5px; padding: 1px 30px; margin-right: 30%; margin-left: 30%;">
                <br> <br>
                <form accept-charset="UTF-8" action="mailto:shanebrown013@gmail.com" method="POST" enctype="multipart/form-data"  target="_blank" id="wpform">
                   <div>
                      <label>Full Name</label>
                      <div>
                         <input style="margin-top: 5px; background-color: #fff; height:35px; width:235px;" type="text" name="first_name" placeholder="Enter your name" required="required">
                      </div>
                   </div>
                   <br>
                   <div>
                      <label>Email Address</label>
                      <div>
                         <input style="margin-top: 5px;background-color: #fff; height:35px; width:235px;" type="email" name="email" placeholder="Enter your email address" required="required">
                      </div>
                   </div>
                   <br>
                   <div>
                      <label>Your Message</label>
                      <div>
                         <textarea style="margin-top: 5px;background-color: #fff; height:50px; width:235px;" type="text" name="message" placeholder="Enter your message" required="required"></textarea>
                      </div>
                   </div>
                   
                   <br>
                   <input type="hidden" name="utf8" value="✓">
                   <button class="contactButton" type="submit">SUBMIT</button>
                </form>
                
             </div>
             <h3 class="infoBelow">
                Or <br> <br> Email me at <br> <u>shanebrown013@gmail.com</u> <br> <br>
             </h3>
         </div>

         <!-- Fading out the Header -->
         <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
         <script>
            //  Fading out the Header
            $(window).scroll(function() {
                $(".middleHeader").css("opacity", 1 - $(window).scrollTop() / 150);
            });
         </script>

    </body>
</html>
